<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dark Theme</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 260px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a1a;
      color: #e8e8e8;
      padding: 16px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .header h1 {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.3px;
    }

    .moon {
      font-size: 20px;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #252525;
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 12px;
    }

    .toggle-label {
      font-size: 13px;
      color: #ccc;
    }

    /* Toggle switch */
    .switch {
      position: relative;
      width: 44px;
      height: 24px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      inset: 0;
      background: #444;
      border-radius: 24px;
      cursor: pointer;
      transition: background 0.25s;
    }

    .slider::before {
      content: '';
      position: absolute;
      width: 18px;
      height: 18px;
      left: 3px;
      top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.25s;
    }

    input:checked + .slider {
      background: #5a9cf8;
    }

    input:checked + .slider::before {
      transform: translateX(20px);
    }

    .status {
      font-size: 11px;
      color: #888;
      text-align: center;
    }

    .status.on {
      color: #5a9cf8;
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="moon">🌙</span>
    <h1>Dark Theme</h1>
  </div>

  <div class="toggle-row">
    <span class="toggle-label">Enable on this site</span>
    <label class="switch">
      <input type="checkbox" id="toggle" />
      <span class="slider"></span>
    </label>
  </div>

  <p class="status" id="status">Loading…</p>

  <script src="popup.js"></script>
</body>
</html>
